name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Build
        uses: withastro/action@v4
        with:
          package-manager: pnpm@10
