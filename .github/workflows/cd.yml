name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  # --- Parallel Documentation Build Jobs ---

  build-node-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Valkey Glide Docs
        uses: actions/checkout@v4
      
      - name: Checkout Valkey Glide Source
        uses: actions/checkout@v4
        with:
          repository: valkey-io/valkey-glide
          path: doc-gen/valkey-glide
          ref: main

      - name: Install Dependencies
        run: ./doc-gen/install-deps.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Node Docs
        run: ./doc-gen/build-node-docs.sh

      - name: Upload Node Docs
        uses: actions/upload-artifact@v4
        with:
          name: node-docs
          path: doc-gen/docs/node
          retention-days: 1

  build-java-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      - name: Checkout Valkey Glide Source
        uses: actions/checkout@v4
        with:
          repository: valkey-io/valkey-glide
          path: doc-gen/valkey-glide
          ref: main

      - name: Install Dependencies
        run: ./doc-gen/install-deps.sh

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Java Docs
        run: ./doc-gen/build-java-docs.sh

      - name: Upload Java Docs
        uses: actions/upload-artifact@v4
        with:
          name: java-docs
          path: doc-gen/docs/java
          retention-days: 1

  build-python-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      - name: Checkout Valkey Glide Source
        uses: actions/checkout@v4
        with:
          repository: valkey-io/valkey-glide
          path: doc-gen/valkey-glide
          ref: main

      - name: Install Dependencies
        run: ./doc-gen/install-deps.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate Python Docs
        run: ./doc-gen/build-python-docs.sh

      - name: Upload Python Docs
        uses: actions/upload-artifact@v4
        with:
          name: python-docs
          path: doc-gen/docs/python
          retention-days: 1

  # --- Main Site Build ---

  build-site:
    needs: [build-node-docs, build-java-docs, build-python-docs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Node Docs
        uses: actions/download-artifact@v4
        with:
          name: node-docs
          path: public/languages/nodejs/api

      - name: Download Java Docs
        uses: actions/download-artifact@v4
        with:
          name: java-docs
          path: public/languages/java/api

      - name: Download Python Docs
        uses: actions/download-artifact@v4
        with:
          name: python-docs
          path: public/languages/python/api

      - name: ls
        run: ls -R public/languages

      # Build the Astro Site
      - name: Install, build, and upload site
        uses: withastro/action@v4
        with:
          package-manager: pnpm@10

  # --- Deployment ---

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4